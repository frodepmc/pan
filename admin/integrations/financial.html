  <!-- CRUX · Admin session guard (blocks render until verified) -->
  <script>
    (function () {
      // Hide body until session is verified (prevents flash of content).
      var styleEl = document.createElement('style');
      styleEl.id = 'crux-admin-guard-style';
      styleEl.textContent = 'body{visibility:hidden}html{background:#0E1A2B}#crux-guard-veil{position:fixed;inset:0;z-index:999999;background:#0E1A2B;color:#78B7EE;display:flex;align-items:center;justify-content:center;font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.25em;text-transform:uppercase;visibility:visible}';
      document.head.appendChild(styleEl);

      // Veil mounted after DOM ready
      document.addEventListener('DOMContentLoaded', function () {
        if (document.getElementById('crux-guard-veil')) return;
        var veil = document.createElement('div');
        veil.id = 'crux-guard-veil';
        veil.textContent = 'Verificando sesión…';
        document.body.appendChild(veil);
      });

      fetch('/api/auth/verify', { method: 'GET', credentials: 'same-origin', cache: 'no-store' })
        .then(function (r) {
          if (!r.ok) throw new Error('unauth');
          return r.json();
        })
        .then(function () {
          var s = document.getElementById('crux-admin-guard-style');
          if (s) s.remove();
          var v = document.getElementById('crux-guard-veil');
          if (v) v.remove();
        })
        .catch(function () {
          window.location.replace('/admin');
        });
    })();
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; text-rendering: optimizeLegibility; }
    body { background: #0E1A2B; font-family: 'Montserrat', sans-serif; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }
    ::selection { background: rgba(56,105,171,0.25); color: #FFFFFF; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #243A55; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #3869AB66; }
    ::-webkit-scrollbar-corner { background: transparent; }
    * { scrollbar-width: thin; scrollbar-color: #243A55 transparent; }

    /* Card hover */
    .crux-card { transition: border-color 0.2s ease, box-shadow 0.2s ease; border: 1px solid #243A55; }
    .crux-card:hover { border-color: #2D4868; box-shadow: 0 2px 16px rgba(0,0,0,0.25); }

    /* Tab button hover */
    .crux-tab-btn { transition: all 0.15s ease !important; }
    .crux-tab-btn:hover { color: #E6EDF6 !important; background: rgba(56,105,171,0.06) !important; }

    /* Add button hover */
    .crux-btn-add { transition: all 0.15s ease; }
    .crux-btn-add:hover { background: rgba(56,105,171,0.18) !important; border-color: #3869AB !important; }

    /* Checklist item hover */
    .crux-check-item { transition: opacity 0.15s, background 0.15s; border-radius: 6px; margin: 0 -8px; padding-left: 8px !important; padding-right: 8px !important; }
    .crux-check-item:hover { background: rgba(255,255,255,0.02); }

    /* Row hover */
    .crux-row { transition: background 0.15s; border-radius: 4px; margin: 0 -4px; padding-left: 4px !important; padding-right: 4px !important; }
    .crux-row:hover { background: rgba(255,255,255,0.018); }

    /* Input focus glow */
    input:focus { box-shadow: 0 0 0 2px rgba(56,105,171,0.15); }

    @media (max-width: 1024px) {
      .crux-grid-5 { grid-template-columns: repeat(3, 1fr) !important; }
      .crux-grid-2 { grid-template-columns: 1fr !important; }
    }
    @media (max-width: 768px) {
      .crux-grid-5 { grid-template-columns: repeat(2, 1fr) !important; }
      .crux-grid-3 { grid-template-columns: 1fr !important; }
      .crux-grid-4 { grid-template-columns: repeat(2, 1fr) !important; }
      .crux-tabs { overflow-x: auto; -webkit-overflow-scrolling: touch; }
      .crux-main { padding: 20px 16px !important; }
      .crux-header { padding: 20px 16px 0 !important; }
      .crux-header-inner { flex-direction: column; align-items: flex-start !important; gap: 12px !important; }
      .crux-header-right { text-align: left !important; }
      .crux-table-wide { overflow-x: auto !important; -webkit-overflow-scrolling: touch; }
      .crux-table-wide > div { min-width: 600px; }
      .crux-hero-banner { height: auto !important; min-height: 160px !important; overflow: hidden !important; }
      .crux-hero-inner { flex-direction: column !important; align-items: flex-start !important; gap: 10px !important; padding: 16px 16px !important; justify-content: center !important; }
      .crux-hero-inner > div:first-child > div:first-child { font-size: 20px !important; }
      .crux-hero-inner > div:last-child { width: 100% !important; flex-wrap: wrap !important; gap: 8px !important; }
      .crux-hero-inner > div:last-child > div { padding: 6px 10px !important; flex-shrink: 0 !important; }
      .crux-hero-inner > div:last-child > div:first-child > button { padding: 7px 16px !important; font-size: 12px !important; }
      .crux-hero-inner > div:last-child > div:last-child { flex: 1 1 auto !important; min-width: 0 !important; justify-content: center !important; }
      .crux-hero-inner > div:last-child > div:last-child > div { min-width: 0 !important; flex: 1 !important; }
      .crux-footer { padding: 16px 16px 20px !important; }
      .crux-scroll-table { overflow-x: auto !important; -webkit-overflow-scrolling: touch; }
      .crux-scroll-table > div { min-width: 480px; }
      .crux-rutinas-grid { grid-template-columns: 1fr !important; }
      .crux-card { padding: 18px !important; }
    }
    @media (max-width: 480px) {
      .crux-grid-5 { grid-template-columns: 1fr !important; }
      .crux-grid-4 { grid-template-columns: 1fr !important; }
      .crux-grid-3 { grid-template-columns: 1fr !important; }
      .crux-grid-2 { grid-template-columns: 1fr !important; }
      .crux-tab-btn { font-size: 11px !important; padding: 10px 10px !important; }
      .crux-scroll-table > div { min-width: 420px; }
      .crux-resumen-grid { grid-template-columns: 1fr !important; }
      .crux-card > div { flex-wrap: wrap; }
    }
    /* Hardening: evita que contenido ancho (ApexCharts, tablas) expanda celdas de grid/flex */
    .crux-grid-2 > *, .crux-grid-3 > *, .crux-grid-4 > *, .crux-grid-5 > *,
    .crux-resumen-grid > *, .crux-rutinas-grid > * { min-width: 0; }
    /* Tabs siempre scrolleables horizontalmente si no caben (evita expandir body en Tablet P) */
    .crux-tabs { overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: thin; }
    .crux-tabs::-webkit-scrollbar { height: 4px; }
    .crux-tabs::-webkit-scrollbar-thumb { background: #243A55; border-radius: 2px; }

    /* PDF/Print avoidance */
    .crux-card { page-break-inside: avoid; break-inside: avoid; }
    .crux-grid-2, .crux-grid-5 { page-break-inside: avoid; break-inside: avoid; }

    /* ── PDF Export Mode ── */
    .pdf-header { display: none; }
    .pdf-footer { display: none; }

    .pdf-mode .pdf-header {
      display: flex !important;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      margin-bottom: 20px;
      border-bottom: 2px solid #3869AB;
      background: linear-gradient(135deg, rgba(56,105,171,0.08) 0%, transparent 100%);
      border-radius: 8px 8px 0 0;
    }
    .pdf-mode .pdf-footer {
      display: flex !important;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      margin-top: 24px;
      border-top: 1px solid #243A55;
      font-size: 9px;
      color: #6B7280;
    }
    .pdf-mode .crux-card {
      border: 1px solid #2D4868 !important;
      box-shadow: 0 1px 8px rgba(0,0,0,0.3) !important;
    }
    .pdf-mode .crux-btn-add { display: none !important; }
    .pdf-mode input[type="number"],
    .pdf-mode input[type="text"] {
      border-color: transparent !important;
      box-shadow: none !important;
    }
    /* Force page breaks between major sections in PDF */
    .pdf-mode .pdf-page-break { page-break-before: always; break-before: always; }

    /* Print styles */
    @media print {
      body { background: white !important; }
      .crux-card { border: 1px solid #ddd !important; box-shadow: none !important; background: white !important; color: #111 !important; }
      header { border-bottom: 2px solid #111 !important; }
      footer { border-top: 1px solid #ddd !important; }
      .crux-tabs, .crux-btn-add, .crux-header-right { display: none !important; }
      * { color: #111 !important; }
      svg polyline { stroke: #2D4868 !important; }

    /* Focus-visible for keyboard nav */
    .crux-tab-btn:focus-visible, .crux-btn-add:focus-visible {
      outline: 2px solid #3869AB;
      outline-offset: 2px;
    }
  </style>

  <div id="root"></div>
  <script type="text/babel" data-presets="react">
    /** @jsxRuntime classic */
    const { useState, useCallback, useRef, useEffect } = React;

    /* ─── ApexCharts wrapper ─── */
    function ApexChart({ options, type, height, width }) {
      var ref = useRef(null);
      var chartRef = useRef(null);
      useEffect(function() {
        if (!ref.current) return;
        if (chartRef.current) chartRef.current.destroy();
        var opts = Object.assign({}, options, {
          chart: Object.assign({}, options.chart || {}, {
            type: type || "line",
            height: height || 200,
            width: width || "100%",
            background: "transparent",
            fontFamily: "'Instrument Sans', sans-serif",
            toolbar: { show: false },
            animations: { enabled: true, easing: "easeinout", speed: 600 },
          }),
          theme: { mode: "dark" },
          dataLabels: Object.assign({ enabled: false }, options.dataLabels || {}),
          grid: Object.assign({ borderColor: "#243A55", strokeDashArray: 3, padding: { left: 4, right: 4 } }, options.grid || {}),
          tooltip: Object.assign({ theme: "dark", style: { fontSize: "11px" } }, options.tooltip || {}),
        });
        chartRef.current = new ApexCharts(ref.current, opts);
        chartRef.current.render();
        return function() { if (chartRef.current) chartRef.current.destroy(); };
      }, [JSON.stringify(options), type, height, width]);
      return React.createElement("div", { ref: ref });
    }

    /* ─── PDF Export ─── */
    var TAB_NAMES = { kpi: "Resumen Ejecutivo", pyl: "P&L", costes: "Costes", cash: "Cash Flow", clientes: "Clientes", unit: "Unit Economics", escenarios: "Escenarios", estrategico: "Estratégico", checklist: "Checklist" };
    var TAB_SLUGS = { kpi: "resumen-ejecutivo", pyl: "pyl", costes: "costes", cash: "cash-flow", clientes: "clientes", unit: "unit-economics", escenarios: "escenarios", estrategico: "estrategico", checklist: "checklist" };
    window.__cruxActiveTab = "kpi";

    function createPdfHeader(tabName) {
      var header = document.createElement("div");
      header.className = "pdf-header";
      header.innerHTML = '<div style="display:flex;align-items:center;gap:12px"><img src="' + CRUX_LOGO + '" style="width:30px;height:30px;filter:brightness(0) invert(1)" /><div><div style="font-size:14px;font-weight:700;color:#FFFFFF;letter-spacing:0.5px;text-transform:uppercase;font-family:Montserrat,sans-serif">CRUX Consulting</div><div style="font-size:9px;color:#8A99AE;margin-top:2px;letter-spacing:0.8px;text-transform:uppercase;font-family:Montserrat,sans-serif">Dirección Financiera — Módulo 2.3</div></div></div><div style="text-align:right"><div style="font-size:13px;font-weight:700;color:#5B9BD5;font-family:Montserrat,sans-serif;letter-spacing:0.4px">' + tabName + '</div><div style="font-size:9px;color:#8A99AE;margin-top:3px;font-family:Montserrat,sans-serif">' + new Date().toLocaleDateString("es-ES", { day: "numeric", month: "long", year: "numeric" }) + '</div></div>';
      return header;
    }

    function createPdfFooter() {
      var footer = document.createElement("div");
      footer.className = "pdf-footer";
      footer.innerHTML = '<span style="font-style:italic">Documento generado automáticamente — CRUX Dashboard Financiero</span><span>cruxconsulting.es</span>';
      return footer;
    }

    /* Tabs with dedicated print views */
    var PRINT_VIEW_TABS = ["kpi", "pyl", "costes", "cash", "clientes", "unit", "escenarios", "estrategico", "checklist"];

    function exportCurrentTab() {
      var tabId = window.__cruxActiveTab || "tab";
      var slug = TAB_SLUGS[tabId] || "tab";

      /* If print view exists, trigger React-based export */
      if (PRINT_VIEW_TABS.indexOf(tabId) >= 0 && window.__cruxExportPrint) {
        window.__cruxExportPrint(tabId);
        return;
      }

      /* Fallback: DOM-capture for tabs without print views */
      var el = document.querySelector("main");
      if (!el) return;
      var tabName = TAB_NAMES[tabId] || "Dashboard";
      document.body.classList.add("pdf-mode");
      document.body.style.overflow = "hidden";
      document.documentElement.style.overflow = "hidden";
      var header = createPdfHeader(tabName);
      var footer = createPdfFooter();
      el.insertBefore(header, el.firstChild);
      el.appendChild(footer);
      var rect = el.getBoundingClientRect();
      var pdfW = 420;
      var pdfH = Math.max(297, Math.ceil(pdfW * (rect.height / rect.width)) + 20);
      html2pdf().set({
        margin: [6, 10, 6, 10],
        filename: "crux-" + slug + "-" + new Date().toISOString().slice(0, 10) + ".pdf",
        image: { type: "jpeg", quality: 0.92 },
        html2canvas: { scale: 2, backgroundColor: "#0E1A2B", useCORS: true, scrollY: 0, windowWidth: 1280, logging: false },
        jsPDF: { unit: "mm", format: [pdfW, pdfH], orientation: "landscape" },
        pagebreak: { mode: ["avoid-all", "css"] },
      }).from(el).save().then(function() {
        el.removeChild(header);
        el.removeChild(footer);
        document.body.classList.remove("pdf-mode");
        document.body.style.overflow = "";
        document.documentElement.style.overflow = "";
      });
    }

    function exportFullPage() {
      var el = document.querySelector("main");
      if (!el) return;

      document.body.classList.add("pdf-mode");

      var header = createPdfHeader("Informe Completo");
      var footer = createPdfFooter();
      el.insertBefore(header, el.firstChild);
      el.appendChild(footer);

      var rect = el.getBoundingClientRect();
      var pdfW = 420;
      var pdfH = Math.max(297, Math.ceil(pdfW * (rect.height / rect.width)) + 20);

      html2pdf().set({
        margin: [6, 10, 6, 10],
        filename: "crux-informe-completo-" + new Date().toISOString().slice(0, 10) + ".pdf",
        image: { type: "jpeg", quality: 0.92 },
        html2canvas: { scale: 2, backgroundColor: "#0E1A2B", useCORS: true, scrollY: 0, windowWidth: 1280, logging: false },
        jsPDF: { unit: "mm", format: [pdfW, pdfH], orientation: "landscape" },
        pagebreak: { mode: ["avoid-all", "css"] },
      }).from(el).save().then(function() {
        el.removeChild(header);
        el.removeChild(footer);
        document.body.classList.remove("pdf-mode");
      });
    }

    const CRUX_LOGO = "assets/crux-logo.png?v=2";

    /* ── Paleta CRUX Oficial ──
       Azul CRUX #3869AB · Azul Oscuro #1E3A5F · Azul Claro #5B9BD5
       Gris Medio #6B7280 · Gris Suave #D1D5DB · Tipografía Montserrat
       Tema: Navy corporativo refinado (charcoal → deep navy) */
    const C = {
      bg: "#0E1A2B",            /* navy profundo, casi negro azulado */
      surface: "#152538",        /* tarjeta sobre navy */
      surfaceHover: "#1B2D44",
      surfaceAlt: "#1E3A5F",     /* azul oscuro CRUX — headers fuertes */
      border: "#243A55",
      borderLight: "#2D4868",
      accent: "#3869AB",          /* AZUL CRUX */
      accent2: "#5B9BD5",         /* azul claro CRUX */
      accentDeep: "#1E3A5F",      /* azul oscuro CRUX */
      accentMuted: "#3869AB99",
      accentGlow: "rgba(56,105,171,0.10)",
      accentGlow2: "rgba(56,105,171,0.18)",
      /* Estados re-tonificados a familia CRUX (verde-azulado, ámbar apagado, terracota) */
      green: "#4FA68C",   greenBg: "rgba(79,166,140,0.12)",
      amber: "#C9A96A",   amberBg: "rgba(201,169,106,0.12)",
      red:   "#C97064",   redBg:   "rgba(201,112,100,0.12)",
      text: "#E6EDF6",            /* blanco azulado */
      textSec: "#A8B5C7",
      textDim: "#6B7280",         /* gris medio CRUX */
      textMuted: "#8A99AE",
      white: "#FFFFFF",
    };

    const font = "'Montserrat', -apple-system, BlinkMacSystemFont, sans-serif";
    const mono = "'JetBrains Mono', 'SF Mono', monospace";

    function fmt(n) {
      if (n === null || n === undefined || n === "") return "—";
      return Number(n).toLocaleString("es-ES");
    }

    function StatusDot({ status }) {
      const color = status === "sano" ? C.green : status === "alerta" ? C.amber : C.red;
      const label = status === "sano" ? "Saludable" : status === "alerta" ? "Atención" : "Riesgo";
      return (
        <span style={{ display: "inline-flex", alignItems: "center", gap: 6, fontSize: 11, fontWeight: 600, color, letterSpacing: 0.3 }}>
          <span style={{ width: 7, height: 7, borderRadius: "50%", background: color, display: "inline-block" }} />
          {label}
        </span>
      );
    }

    function Sparkline({ data, color = C.accent, w = 100, h = 28 }) {
      if (!data || data.length < 2) return null;
      const nums = data.map(Number).filter((n) => !isNaN(n));
      if (nums.length < 2) return null;
      const min = Math.min(...nums);
      const max = Math.max(...nums);
      const range = max - min || 1;
      const pts = nums.map((v, i) => ((i / (nums.length - 1)) * w) + "," + (h - 2 - ((v - min) / range) * (h - 4))).join(" ");
      const lastX = w;
      const lastY = h - 2 - ((nums[nums.length - 1] - min) / range) * (h - 4);
      return (
        <svg width={w} height={h} style={{ display: "block", flexShrink: 0 }}>
          <polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" opacity="0.7" />
          <circle cx={lastX} cy={lastY} r="2.5" fill={color} />
        </svg>
      );
    }

    function Bar({ value, max, color = C.accent, h = 5 }) {
      const pct = max > 0 ? Math.min((value / max) * 100, 100) : 0;
      return (
        <div style={{ background: color + "15", borderRadius: h, height: h, width: "100%" }}>
          <div style={{ background: color, height: "100%", width: pct + "%", borderRadius: h, transition: "width 0.4s ease" }} />
        </div>
      );
    }

    function EditableCell({ value, onChange, type = "number", step, style = {} }) {
      var [localVal, setLocalVal] = useState(String(value));
      var [focused, setFocused] = useState(false);
      useEffect(function() { if (!focused) setLocalVal(String(value)); }, [value, focused]);
      return (
        <input
          type={type}
          step={step}
          value={focused ? localVal : value}
          onChange={function(e) {
            setLocalVal(e.target.value);
            if (type === "number") {
              var v = e.target.value;
              if (v !== "" && v !== "-" && !isNaN(Number(v))) { onChange(Number(v)); }
            } else {
              onChange(e.target.value);
            }
          }}
          style={Object.assign({}, {
            background: "transparent", border: "1px solid transparent", borderRadius: 4,
            color: C.text, fontFamily: mono, fontSize: 13, padding: "4px 8px",
            width: "100%", textAlign: "right", outline: "none", transition: "border-color 0.2s",
          }, style)}
          onFocus={function(e) { e.target.style.borderColor = C.accent; setFocused(true); setLocalVal(String(value)); }}
          onBlur={function(e) {
            e.target.style.borderColor = "transparent";
            setFocused(false);
            if (type === "number") {
              var n = Number(localVal);

                    <CardLabel>{"Resultado neto mensual — " + anyo}</CardLabel>
                    <ApexChart type="bar" height={240} options={{
                      series: [{ name: "Resultado neto", data: chartNeto }],
                      colors: [function(opts) { return opts.value >= 0 ? "#4FA68C" : "#C97064"; }],
                      plotOptions: { bar: { borderRadius: 3, columnWidth: "55%", colors: { ranges: [{ from: -999999, to: 0, color: C.red }, { from: 0, to: 999999, color: C.green }] } } },
                      xaxis: { categories: chartMeses, labels: { style: { colors: C.textDim, fontSize: "11px" } } },
                      yaxis: { labels: { style: { colors: C.textDim, fontSize: "11px" }, formatter: function(v) { return fmt(Math.round(v)); } } },
                      legend: { show: false },
                      grid: { borderColor: C.border, strokeDashArray: 3 },
                      annotations: { yaxis: [{ y: 0, borderColor: C.textDim, strokeDashArray: 2 }] },
                    }} />
                  </Card>
                </div>
              ) : null
            );
          })()}
        </Section>
      );
    }

    /* ═══════════ TAB: Costes ═══════════ */
    function TabCostes({ pyl, setPyl, pylMensual, setPylMensual, selAnyo, selIng, selCos, selOpex }) {
      var MESES_NOMBRE = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];

      /* Shared month/year selector for both CD and OPEX */
      var [costesVistaAnual, setCostesVistaAnual] = useState(false);
      var [costesMes, setCostesMes] = useState(6);
      var [costesAnyo, setCostesAnyo] = useState(selAnyo || pylMensual.anyo);
      var costesKey = costesAnyo + "-" + costesMes;
      var navCostesAnyo = function(dir) {
        var next = costesAnyo + dir;
        if (next < 2026) return;
        setCostesAnyo(next);
      };
      var navCostesMes = function(dir) {
        var nm = costesMes + dir;
        if (nm < 0) { if (costesAnyo > 2026) { setCostesAnyo(costesAnyo - 1); setCostesMes(11); } }
        else if (nm > 11) { setCostesAnyo(costesAnyo + 1); setCostesMes(0); }
        else { setCostesMes(nm); }
      };

      /* Sync breakdown totals → datos[year][month].costes/.opex */
      var syncTotals = function(state) {
        var cdItems = state.costesDirPorMes && state.costesDirPorMes[costesKey] ? state.costesDirPorMes[costesKey] : (pyl.costesDesglose || []);
        var oxItems = state.opexPorMes && state.opexPorMes[costesKey] ? state.opexPorMes[costesKey] : (pyl.opexDesglose || []);
        var cdSum = cdItems.reduce(function(s, c) { return s + Number(c.importe || 0); }, 0);
        var oxSum = oxItems.reduce(function(s, c) { return s + Number(c.importe || 0); }, 0);
        var d = Object.assign({}, state.datos || {});
        var yearArr = (d[costesAnyo] || EMPTY_YEAR()).map(function(m, i) {
          return i === costesMes ? Object.assign({}, m, { costes: cdSum, opex: oxSum }) : m;
        });
        d[costesAnyo] = yearArr;
        return Object.assign({}, state, { datos: d });
      };

      /* Generic per-month helpers — all sync to datos after edit */
      var getItems = function(storeKey, defaultArr) {
        return pylMensual[storeKey] && pylMensual[storeKey][costesKey] ? pylMensual[storeKey][costesKey] : (pyl[defaultArr] || []);
      };
      var setItem = function(storeKey, defaultArr, idx, field, val) {
        setPylMensual(function(p) {
          var pm = Object.assign({}, p[storeKey] || {});
          var items = (pm[costesKey] || (pyl[defaultArr] || []).map(function(c) { return Object.assign({}, c); })).map(function(c, j) {
            return j === idx ? Object.assign({}, c, (function() { var o = {}; o[field] = val; return o; })()) : c;
          });
          pm[costesKey] = items;
          var upd = {}; upd[storeKey] = pm;
          return syncTotals(Object.assign({}, p, upd));
        });
      };
      var addItem = function(storeKey, defaultArr) {
        setPylMensual(function(p) {
          var pm = Object.assign({}, p[storeKey] || {});
          var items = (pm[costesKey] || (pyl[defaultArr] || []).map(function(c) { return Object.assign({}, c); })).concat([{ concepto: "Nuevo concepto", importe: 0 }]);
          pm[costesKey] = items;
          var upd = {}; upd[storeKey] = pm;
          return syncTotals(Object.assign({}, p, upd));
        });
      };
      var removeItem = function(storeKey, defaultArr, idx) {
        setPylMensual(function(p) {
          var pm = Object.assign({}, p[storeKey] || {});
          var current = pm[costesKey] || (pyl[defaultArr] || []).map(function(c) { return Object.assign({}, c); });
          pm[costesKey] = current.filter(function(_, j) { return j !== idx; });
          var upd = {}; upd[storeKey] = pm;
          return syncTotals(Object.assign({}, p, upd));
        });
      };

      /* Resolve items for current month */
      var cdItemsMes = getItems("costesDirPorMes", "costesDesglose");
      var opexItemsMes = getItems("opexPorMes", "opexDesglose");

      /* Annual aggregation: sum all 12 months by concepto name */
      var aggregateYear = function(storeKey, defaultArr) {
        var totals = {};
        for (var mi = 0; mi < 12; mi++) {
          var k = costesAnyo + "-" + mi;
          var items = pylMensual[storeKey] && pylMensual[storeKey][k] ? pylMensual[storeKey][k] : (pyl[defaultArr] || []);
          items.forEach(function(it) {
            var name = it.concepto || "Sin nombre";
            if (!totals[name]) totals[name] = 0;
            totals[name] += Number(it.importe || 0);
          });
        }
        return Object.keys(totals).map(function(name) { return { concepto: name, importe: totals[name] }; })
          .sort(function(a, b) { return b.importe - a.importe; });
      };

      var cdItems = costesVistaAnual ? aggregateYear("costesDirPorMes", "costesDesglose") : cdItemsMes;
      var opexItems = costesVistaAnual ? aggregateYear("opexPorMes", "opexDesglose") : opexItemsMes;
      var cdTotal = cdItems.reduce(function(s, c) { return s + Number(c.importe || 0); }, 0);
      var opexTotal = opexItems.reduce(function(s, c) { return s + Number(c.importe || 0); }, 0);

      /* Render a breakdown card */
      var renderBreakdown = function(title, storeKey, defaultArr, items, total, color) {
        var isAnual = costesVistaAnual;
        return (
          <Card>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <CardLabel>{title}</CardLabel>
                {isAnual && <span style={{ fontSize: 8, color: C.accent, background: C.accentGlow, padding: "2px 6px", borderRadius: 3, fontWeight: 700, letterSpacing: 0.4 }}>ANUAL</span>}
              </div>
              <span style={{ fontSize: 18, fontWeight: 700, fontFamily: mono, color: C.white }}>{fmt(total)} €</span>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: isAnual ? "2fr 1fr 0.5fr" : "2fr 1fr 0.5fr 28px", fontSize: 10, color: C.textDim, paddingBottom: 8, borderBottom: "1px solid " + C.border }}>
              <span>Concepto</span><span style={{ textAlign: "right" }}>{isAnual ? "Total 12m" : "Importe"}</span><span style={{ textAlign: "right" }}>%</span>{!isAnual && <span></span>}
            </div>
            {items.map(function(item, idx) {
              var pct = total > 0 ? ((Number(item.importe || 0) / total) * 100).toFixed(0) : 0;
              return (
                <div key={idx} style={{ display: "grid", gridTemplateColumns: isAnual ? "2fr 1fr 0.5fr" : "2fr 1fr 0.5fr 28px", padding: "10px 0", borderBottom: "1px solid " + C.border, alignItems: "center" }}>
                  {isAnual ? (
                    <span style={{ fontSize: 13, color: C.textSec }}>{item.concepto}</span>
                  ) : (
                    <EditableText value={item.concepto} onChange={function(v) { setItem(storeKey, defaultArr, idx, "concepto", v); }} />
                  )}
                  {isAnual ? (
                    <span style={{ textAlign: "right", fontFamily: mono, fontSize: 13, color: C.white }}>{fmt(item.importe)}</span>
                  ) : (
                    <EditableCell value={item.importe} onChange={function(v) { setItem(storeKey, defaultArr, idx, "importe", Number(v)); }} />
                  )}
                  <span style={{ textAlign: "right", fontSize: 11, color: C.textDim }}>{pct}%</span>
                  {!isAnual && (items.length > 1 ? (
                    <button onClick={function() { removeItem(storeKey, defaultArr, idx); }}
                      style={{ background: "transparent", border: "none", color: C.textDim, cursor: "pointer", fontSize: 15, padding: 0, lineHeight: 1, borderRadius: 4, transition: "color 0.15s", fontFamily: font }}
                      onMouseEnter={function(e) { e.target.style.color = C.red; }}
                      onMouseLeave={function(e) { e.target.style.color = C.textDim; }}>×</button>
                  ) : <span></span>)}
                </div>
              );
            })}
            {!isAnual && <div style={{ paddingTop: 10 }}>
              <button className="crux-btn-add" onClick={function() { addItem(storeKey, defaultArr); }}
                style={{ background: C.accentGlow, color: C.accent, border: "1px solid " + C.accentMuted, borderRadius: 6, padding: "6px 14px", fontSize: 11, fontWeight: 600, cursor: "pointer", fontFamily: font }}>+ Añadir</button>
            </div>}
          </Card>
        );
      };

      /* Donut data — from current month */
      var allItems = cdItems.filter(function(c) { return Number(c.importe || 0) > 0; }).map(function(c) { return { label: "CD: " + c.concepto, val: Number(c.importe || 0) }; })
        .concat(opexItems.filter(function(c) { return Number(c.importe || 0) > 0; }).map(function(c) { return { label: "OX: " + c.concepto, val: Number(c.importe || 0) }; }));
      var totalGeneral = cdTotal + opexTotal;
      var mesIng = selIng || pyl.ingresos;
      var margenCoste = mesIng > 0 ? ((1 - totalGeneral / mesIng) * 100).toFixed(1) : 0;

      /* Annual spending chart data */
      var MESES_S_CHART = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
      var anyo = selAnyo || pylMensual.anyo;
      var yearData = pylMensual.datos[anyo] || EMPTY_YEAR();
      var chartCostesDir = []; var chartOpex = []; var chartMesesLabel = [];
      yearData.forEach(function(m, i) {
        if (Number(m.costes || 0) > 0 || Number(m.opex || 0) > 0) {
          chartMesesLabel.push(MESES_S_CHART[i]);
          chartCostesDir.push(Number(m.costes || 0));
          chartOpex.push(Number(m.opex || 0));
        }
      });

      return (
        <Section title="Desglose de Costes" subtitle="Gestión detallada de costes directos y operativos">
          {/* Shared selector: toggle + period nav */}
          <div style={{ display: "flex", justifyContent: "center", alignItems: "center", gap: 12, marginBottom: 16, padding: "12px 0", background: C.surface, borderRadius: 10, border: "1px solid " + C.border }}>
            {/* Mensual/Anual toggle */}
            <div style={{ display: "flex", background: C.bg, borderRadius: 6, overflow: "hidden" }}>
              {["Mensual", "Anual"].map(function(t, ti) {
                var active = (ti === 0 && !costesVistaAnual) || (ti === 1 && costesVistaAnual);
                return <button key={t} onClick={function() { setCostesVistaAnual(ti === 1); }}
                  style={{ background: active ? C.accent : "transparent", color: active ? C.white : C.textDim, border: "none", padding: "7px 14px", fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: font, transition: "all 0.15s" }}>{t}</button>;
              })}
            </div>
            {/* Period nav */}
            <button onClick={function() { costesVistaAnual ? navCostesAnyo(-1) : navCostesMes(-1); }} disabled={costesAnyo <= 2026 && (costesVistaAnual || costesMes <= 0)}
              style={{ background: "transparent", border: "none", color: costesAnyo <= 2026 && (costesVistaAnual || costesMes <= 0) ? C.border : C.white, cursor: costesAnyo <= 2026 && (costesVistaAnual || costesMes <= 0) ? "default" : "pointer", fontSize: 16, padding: "0 8px", fontFamily: font, opacity: costesAnyo <= 2026 && (costesVistaAnual || costesMes <= 0) ? 0.3 : 1 }}>◂</button>
            <div style={{ textAlign: "center", minWidth: costesVistaAnual ? 60 : 160 }}>
              {!costesVistaAnual && <div style={{ fontSize: 16, fontWeight: 700, color: C.white }}>{MESES_NOMBRE[costesMes]}</div>}
              <div style={{ fontSize: costesVistaAnual ? 18 : 12, fontWeight: 700, color: C.white, fontFamily: mono }}>{costesAnyo}</div>
            </div>
            <button onClick={function() { costesVistaAnual ? navCostesAnyo(1) : navCostesMes(1); }}
              style={{ background: "transparent", border: "none", color: C.white, cursor: "pointer", fontSize: 16, padding: "0 8px", fontFamily: font }}>▸</button>
          </div>

          <div className="crux-grid-2" style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginBottom: 16 }}>
            {renderBreakdown("Costes Directos", "costesDirPorMes", "costesDesglose", cdItems, cdTotal, "#3869AB")}
            {renderBreakdown("OPEX", "opexPorMes", "opexDesglose", opexItems, opexTotal, "#AB8338")}
          </div>
          <div className="crux-grid-2" style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
            <Card>
              <CardLabel>Distribución de Costes</CardLabel>
              <ApexChart type="donut" height={260} options={{
                series: allItems.map(function(a) { return a.val; }),
                labels: allItems.map(function(a) { return a.label; }),
                colors: ["#AB8338", "#3869AB", "#3E526B", "#564C39", "#2A2E33", "#C49A4A", "#5A7FA8", "#6B7E94"],
                legend: { position: "bottom", labels: { colors: C.textSec }, fontSize: "10px" },
                plotOptions: { pie: { donut: { size: "55%", labels: { show: true, total: { show: true, label: "Total", color: C.textDim, fontSize: "11px", formatter: function() { return fmt(totalGeneral) + " €"; } } } } } },
                stroke: { show: false, width: 0 },
                dataLabels: { enabled: false },
              }} />
            </Card>
            <Card>
              <CardLabel>Resumen</CardLabel>
              <div className="crux-resumen-grid" style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20, padding: "12px 0" }}>
                {[
                  { label: "Costes directos", val: fmt(cdTotal) + " €", sub: "COGS + directos", color: C.accent },
                  { label: "OPEX", val: fmt(opexTotal) + " €", sub: "Gastos operativos", color: C.amber },
                  { label: "Total costes", val: fmt(totalGeneral) + " €", sub: "Directos + OPEX", color: C.white },
                  { label: "Margen disponible", val: margenCoste + "%", sub: "Sobre ingresos (" + fmt(mesIng) + " €)", color: Number(margenCoste) >= 15 ? C.green : Number(margenCoste) >= 5 ? C.amber : C.red },
                ].map(function(m, i) {
                  return (
                    <div key={i} style={{ padding: "12px 0", borderBottom: i < 2 ? "1px solid " + C.border : "none" }}>
                      <div style={{ fontSize: 10, color: C.textDim, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 4 }}>{m.label}</div>
                      <div style={{ fontSize: 24, fontWeight: 700, fontFamily: mono, color: m.color }}>{m.val}</div>
                      <div style={{ fontSize: 10, color: C.textDim, marginTop: 2 }}>{m.sub}</div>
                    </div>
                  );
                })}
              </div>
            </Card>
          </div>

          {/* ── Chart: Evolución de gasto anual ── */}
          {chartMesesLabel.length > 1 && (
            <Card style={{ marginTop: 16 }}>
              <CardLabel>{"Evolución de Gasto Anual — " + anyo}</CardLabel>
              <ApexChart type="bar" height={260} options={{
                series: [
                  { name: "Costes directos", data: chartCostesDir },
                  { name: "OPEX", data: chartOpex },
                ],
                chart: { stacked: true },
                colors: ["#3869AB", "#AB8338"],
                plotOptions: { bar: { borderRadius: 3, columnWidth: "50%" } },
                xaxis: { categories: chartMesesLabel, labels: { style: { colors: C.textDim, fontSize: "11px" } } },
                yaxis: { labels: { style: { colors: C.textDim, fontSize: "11px" }, formatter: function(v) { return fmt(Math.round(v)); } } },
                legend: { position: "top", horizontalAlign: "right", labels: { colors: C.textSec }, fontSize: "11px", markers: { radius: 2 } },
                grid: { borderColor: C.border, strokeDashArray: 3 },
                tooltip: { y: { formatter: function(v) { return fmt(v) + " €"; } } },
              }} />
            </Card>
          )}

          {/* ── Costes Mensual Calendarizado ── */}
          {(function() {
            var MESES_S = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
            var colW = "2.2fr " + MESES_S.map(function() { return "1fr"; }).join(" ") + " 1.2fr";
            var anyo = selAnyo || pylMensual.anyo;
            var meses = pylMensual.datos[anyo] || EMPTY_YEAR();
            var setMesCost = function(idx, field, val) {
              setPylMensual(function(p) {
                var yearData = (p.datos[anyo] || EMPTY_YEAR()).map(function(m, i) { return i === idx ? Object.assign({}, m, (function() { var o = {}; o[field] = Number(val); return o; })()) : m; });
                var d = Object.assign({}, p.datos); d[anyo] = yearData;
                return Object.assign({}, p, { datos: d });
              });
            };
            var setAnyoCostes = function(dir) {
              setPylMensual(function(p) {
                var next = p.anyo + dir;
                if (next < 2026) return p;
                var d = Object.assign({}, p.datos);
                if (!d[next]) d[next] = EMPTY_YEAR();
                return Object.assign({}, p, { anyo: next, datos: d });
              });
            };
            var tot = { costes: 0, opex: 0 };
            meses.forEach(function(m) { tot.costes += Number(m.costes || 0); tot.opex += Number(m.opex || 0); });
            var filas = [
              { label: "Costes directos", field: "costes", editable: true, total: tot.costes, color: "#3869AB" },
              { label: "OPEX", field: "opex", editable: true, total: tot.opex, color: "#AB8338" },
              { label: "Total costes", computed: true, fn: function(m) { return Number(m.costes || 0) + Number(m.opex || 0); }, total: tot.costes + tot.opex, bold: true },
              { label: "Margen disponible", computed: true, fn: function(m) { var ing = Number(m.ingresos || 0); var c = Number(m.costes || 0) + Number(m.opex || 0); return ing > 0 ? Number(((ing - c) / ing * 100).toFixed(0)) : 0; }, total: null, isPct: true },
            ];
            return (
              <Card style={{ marginTop: 16 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <CardLabel>{"Evolución Mensual de Costes — " + anyo}</CardLabel>
                  <div style={{ display: "flex", gap: 4, alignItems: "center" }}>
                    <button onClick={function() { setAnyoCostes(-1); }} disabled={anyo <= 2026} style={{ background: "transparent", border: "1px solid " + (anyo <= 2026 ? C.border : C.textDim), borderRadius: 4, color: anyo <= 2026 ? C.border : C.textDim, cursor: anyo <= 2026 ? "default" : "pointer", padding: "2px 8px", fontSize: 11, fontFamily: font, opacity: anyo <= 2026 ? 0.4 : 1 }}>◂</button>
                    <span style={{ fontSize: 13, fontWeight: 700, color: C.white, fontFamily: mono, minWidth: 40, textAlign: "center" }}>{anyo}</span>
                    <button onClick={function() { setAnyoCostes(1); }} style={{ background: "transparent", border: "1px solid " + C.textDim, borderRadius: 4, color: C.textDim, cursor: "pointer", padding: "2px 8px", fontSize: 11, fontFamily: font }}>▸</button>
                  </div>
                </div>
                <div style={{ overflowX: "auto", marginTop: 4 }}>
                  <div style={{ minWidth: 960 }}>
                    <div style={{ display: "grid", gridTemplateColumns: colW, fontSize: 10, color: C.textDim, paddingBottom: 8, borderBottom: "1px solid " + C.border, gap: 4 }}>
                      <span>Concepto</span>
                      {MESES_S.map(function(m) { return <span key={m} style={{ textAlign: "right" }}>{m + " " + String(anyo).slice(-2)}</span>; })}
                      <span style={{ textAlign: "right", fontWeight: 700, color: C.textSec }}>Total Anual</span>
                    </div>
                    {filas.map(function(f, fi) {
                      return (
                        <div key={fi} style={{ display: "grid", gridTemplateColumns: colW, padding: "6px 0", borderBottom: fi < filas.length - 1 ? "1px solid " + C.border : "none", alignItems: "center", gap: 4 }}>
                          <span style={{ fontSize: 12, fontWeight: f.bold ? 700 : 500, color: f.bold ? C.white : f.color || C.textSec }}>{f.label}</span>
                          {meses.map(function(m, mi) {
                            if (f.editable) {
                              return <EditableCell key={mi} value={m[f.field]} onChange={function(v) { setMesCost(mi, f.field, v); }} style={{ fontSize: 11, textAlign: "right" }} />;
                            }
                            var val = f.fn(m);
                            if (f.isPct) return <span key={mi} style={{ textAlign: "right", fontFamily: mono, fontSize: 11, color: val >= 15 ? C.green : val >= 5 ? C.amber : val > 0 ? C.red : C.textDim }}>{val > 0 ? val + "%" : "—"}</span>;
                            return <span key={mi} style={{ textAlign: "right", fontFamily: mono, fontSize: 11, fontWeight: f.bold ? 700 : 400, color: f.bold ? C.white : C.textSec }}>{val > 0 ? fmt(val) : "—"}</span>;
                          })}
                          {f.isPct ? (
                            <span style={{ textAlign: "right", fontFamily: mono, fontSize: 12, fontWeight: 700, color: C.textDim }}>—</span>
                          ) : (
                            <span style={{ textAlign: "right", fontFamily: mono, fontSize: 12, fontWeight: 700, color: C.white }}>{fmt(f.total)}</span>
                          )}
                        </div>
                      );
                    })}
                  </div>
                </div>
              </Card>
            );
          })()}
        </Section>
      );
    }

    /* ═══════════ TAB: Cash Flow ═══════════ */
    function TabCash({ selAnyo, selMes, selKey, navMes, selAging, selCaja, selForecast, pylMensual, setPylMensual, aging, cash, forecast, burnRate, netBurn }) {
      var MESES_FULL = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
      var [cashVistaAnual, setCashVistaAnual] = useState(false);
      var [cashMes, setCashMes] = useState(selMes);
      var [cashAnyo, setCashAnyo] = useState(selAnyo);
      var cashKey = cashAnyo + "-" + cashMes;
      var navCashMes = function(dir) {
        var nm = cashMes + dir;
        if (nm < 0) { if (cashAnyo > 2026) { setCashAnyo(cashAnyo - 1); setCashMes(11); } }
        else if (nm > 11) { setCashAnyo(cashAnyo + 1); setCashMes(0); }
        else { setCashMes(nm); }
      };
      var navCashAnyo = function(dir) { var n = cashAnyo + dir; if (n >= 2026) setCashAnyo(n); };

      /* Resolve data for selected period */
      var localAging = pylMensual.agingPorMes && pylMensual.agingPorMes[cashKey] ? pylMensual.agingPorMes[cashKey] : aging;
      var localCaja = pylMensual.cajaPorMes && pylMensual.cajaPorMes[cashKey] != null ? pylMensual.cajaPorMes[cashKey] : cash.caja;
      var localForecast = pylMensual.forecastPorAnyo && pylMensual.forecastPorAnyo[cashAnyo] ? pylMensual.forecastPorAnyo[cashAnyo] : forecast;
      var total = localAging.reduce(function(s, a) { return s + Number(a.importe || 0); }, 0);
      var runway = netBurn > 0 ? (localCaja / netBurn).toFixed(1) : "∞";

      /* Per-month setters */
      var setAgingMes = function(idx, field, val) {
        setPylMensual(function(p) {
          var pm = Object.assign({}, p.agingPorMes || {});
          var items = (pm[cashKey] || aging.map(function(a) { return Object.assign({}, a); })).map(function(a, j) {
            return j === idx ? Object.assign({}, a, (function() { var o = {}; o[field] = val; return o; })()) : a;
          });
          pm[cashKey] = items;
          return Object.assign({}, p, { agingPorMes: pm });
        });
      };
      var setCajaMes = function(v) {
        setPylMensual(function(p) {
          var pm = Object.assign({}, p.cajaPorMes || {});
          pm[cashKey] = Number(v);
          return Object.assign({}, p, { cajaPorMes: pm });
        });
      };
      var setForecastAnyo = function(idx, field, val) {
        setPylMensual(function(p) {
          var pfa = Object.assign({}, p.forecastPorAnyo || {});
          var items = (pfa[cashAnyo] || forecast.map(function(f) { return Object.assign({}, f); })).map(function(f, j) {
            return j === idx ? Object.assign({}, f, (function() { var o = {}; o[field] = Number(val); return o; })()) : f;
          });
          pfa[cashAnyo] = items;
          return Object.assign({}, p, { forecastPorAnyo: pfa });
        });
      };
      var agingColors = ["#3869AB", "#AB8338", "#3E526B", "#564C39"];
      var escColors = ["#564C39", "#3869AB", "#AB8338"];
      var periodLabel = cashVistaAnual ? "Anual " + cashAnyo : MESES_FULL[cashMes] + " " + cashAnyo;
      return (
        <Section title={"Cash Flow — " + periodLabel} subtitle="Tesorería y control de cobros — Módulo 2.3, secciones 2.2 y 2.3">
          {/* Period selector */}
          <div style={{ display: "flex", justifyContent: "center", alignItems: "center", gap: 12, marginBottom: 16, padding: "12px 0", background: C.surface, borderRadius: 10, border: "1px solid " + C.border }}>
            <div style={{ display: "flex", background: C.bg, borderRadius: 6, overflow: "hidden" }}>
              {["Mensual", "Anual"].map(function(t, ti) {
                var active = (ti === 0 && !cashVistaAnual) || (ti === 1 && cashVistaAnual);
                return <button key={t} onClick={function() { setCashVistaAnual(ti === 1); }}
                  style={{ background: active ? C.accent : "transparent", color: active ? C.white : C.textDim, border: "none", padding: "7px 14px", fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: font, transition: "all 0.15s" }}>{t}</button>;
              })}
            </div>
            <button onClick={function() { cashVistaAnual ? navCashAnyo(-1) : navCashMes(-1); }} disabled={cashAnyo <= 2026 && (cashVistaAnual || cashMes <= 0)}
              style={{ background: "transparent", border: "none", color: cashAnyo <= 2026 && (cashVistaAnual || cashMes <= 0) ? C.border : C.white, cursor: cashAnyo <= 2026 && (cashVistaAnual || cashMes <= 0) ? "default" : "pointer", fontSize: 16, padding: "0 8px", fontFamily: font, opacity: cashAnyo <= 2026 && (cashVistaAnual || cashMes <= 0) ? 0.3 : 1 }}>◂</button>
            <div style={{ textAlign: "center", minWidth: cashVistaAnual ? 60 : 160 }}>
              {!cashVistaAnual && <div style={{ fontSize: 16, fontWeight: 700, color: C.white }}>{MESES_FULL[cashMes]}</div>}
              <div style={{ fontSize: cashVistaAnual ? 18 : 12, fontWeight: 700, color: C.white, fontFamily: mono }}>{cashAnyo}</div>
            </div>
            <button onClick={function() { cashVistaAnual ? navCashAnyo(1) : navCashMes(1); }}
              style={{ background: "transparent", border: "none", color: C.white, cursor: "pointer", fontSize: 16, padding: "0 8px", fontFamily: font }}>▸</button>
          </div>
          {/* ── Hero metrics ── */}
          <div className="crux-grid-3" style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 16, marginBottom: 16 }}>
            {[
              { label: "Caja actual", val: localCaja, editable: true, color: C.white, sub: "Posición de tesorería" },
              { label: "Costes mensuales", val: burnRate, color: C.white, badge: "CALCULADO", sub: netBurn > 0 ? "Burn neto: " + fmt(netBurn) + " €/mes" : "Burn neto: Rentable" },
              { label: "Runway", val: runway, isRunway: true, color: runway === "∞" || Number(runway) >= 6 ? C.green : Number(runway) >= 3 ? C.amber : C.red, sub: "Ref: ≥6 meses" },
            ].map(function(m, mi) {
              return (
                <Card key={mi} style={{ textAlign: "center", padding: "20px 16px" }}>
                  <div style={{ fontSize: 10, color: C.textDim, textTransform: "uppercase", letterSpacing: 0.5 }}>{m.label} {m.badge && <span style={{ fontSize: 8, color: C.accent, background: C.accentGlow, padding: "1px 6px", borderRadius: 3, marginLeft: 4, fontWeight: 700 }}>{m.badge}</span>}</div>
                  {m.editable ? (
                    <div style={{ display: "flex", justifyContent: "center", alignItems: "baseline", gap: 4, marginTop: 8 }}>
                      <EditableCell value={m.val} onChange={function(v) { setCajaMes(v); }} style={{ fontSize: 32, fontWeight: 700, color: m.color, textAlign: "center", width: 180 }} />
                      <span style={{ fontSize: 14, color: C.textDim }}>€</span>
                    </div>
                  ) : (
                    <div style={{ fontSize: 32, fontWeight: 700, fontFamily: mono, color: m.color, marginTop: 8 }}>{m.isRunway ? runway : fmt(m.val) + " €"}</div>
                  )}
                  <div style={{ fontSize: 10, color: C.textDim, marginTop: 6 }}>{m.sub}</div>
                </Card>
              );
            })}
          </div>

          {/* ── Cuentas por Cobrar — Barra segmentada + mini cards ── */}
          <Card style={{ marginBottom: 16 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
              <CardLabel>Cuentas por Cobrar</CardLabel>
              <span style={{ fontSize: 14, fontWeight: 700, fontFamily: mono, color: C.white }}>{fmt(total)} €</span>
            </div>
            {/* Segmented bar */}
            <div style={{ display: "flex", height: 20, borderRadius: 6, overflow: "hidden", marginBottom: 16 }}>
              {localAging.map(function(a, i) {
                var w = total > 0 ? (Number(a.importe) / total * 100) : 25;
                return <div key={i} style={{ width: w + "%", background: agingColors[i], transition: "width 0.3s" }}></div>;
              })}
            </div>
            {/* 4 mini cards */}
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 12 }} className="crux-grid-4">
              {localAging.map(function(a, i) {
                var pct = total > 0 ? ((Number(a.importe) / total) * 100).toFixed(0) : 0;
                return (
                  <div key={i} style={{ background: "rgba(255,255,255,0.02)", borderRadius: 8, padding: "14px 12px", borderLeft: "3px solid " + agingColors[i] }}>
                    <div style={{ fontSize: 11, fontWeight: 600, color: agingColors[i], marginBottom: 6 }}>{a.tramo}</div>
                    <div style={{ display: "flex", alignItems: "baseline", gap: 4 }}>
                      <EditableCell value={a.importe} onChange={function(v) { setAgingMes(i, "importe", Number(v)); }} style={{ fontSize: 18, fontWeight: 700, color: C.white, textAlign: "left", width: 100 }} />
                      <span style={{ fontSize: 11, color: C.textDim }}>{pct}%</span>
                    </div>
                    <div style={{ fontSize: 9, color: C.textDim, marginTop: 6 }}>{a.accion}</div>
                  </div>
                );
              })}
            </div>
          </Card>

          {/* ── Forecast ── */}
          <div className="crux-grid-2" style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
            <Card>
              <CardLabel>Forecast — 3 Escenarios (K€)</CardLabel>
              <ApexChart type="area" height={240} options={{
                series: localForecast.map(function(f) { return { name: f.escenario, data: [Number(f.q1), Number(f.q2), Number(f.q3), Number(f.q4)] }; }),
                colors: escColors,
                stroke: { width: 2, curve: "smooth" },
                fill: { type: "gradient", gradient: { opacityFrom: 0.2, opacityTo: 0.02 } },
                xaxis: { categories: ["Q1", "Q2", "Q3", "Q4"], labels: { style: { colors: C.textDim, fontSize: "11px" } } },
                yaxis: { labels: { style: { colors: C.textDim, fontSize: "11px" }, formatter: function(v) { return Math.round(v) + "K"; } } },
                legend: { position: "top", horizontalAlign: "right", labels: { colors: C.textSec }, fontSize: "11px", markers: { radius: 2 } },
                grid: { borderColor: C.border, strokeDashArray: 3 },
              }} />
            </Card>
            <Card>
              <CardLabel>Forecast Trimestral (K€)</CardLabel>
              <div className="crux-scroll-table">
                <div>
                  <div style={{ display: "grid", gridTemplateColumns: "1.5fr 1fr 1fr 1fr 1fr 1fr", fontSize: 10, color: C.textDim, paddingBottom: 8, borderBottom: "1px solid " + C.border }}>
                    <span>Escenario</span><span style={{ textAlign: "right" }}>Q1</span><span style={{ textAlign: "right" }}>Q2</span><span style={{ textAlign: "right" }}>Q3</span><span style={{ textAlign: "right" }}>Q4</span><span style={{ textAlign: "right" }}>Total</span>
                  </div>
                  {localForecast.map(function(f, i) {
                    var t = Number(f.q1) + Number(f.q2) + Number(f.q3) + Number(f.q4);
                    return (
                      <div key={i} style={{ display: "grid", gridTemplateColumns: "1.5fr 1fr 1fr 1fr 1fr 1fr", padding: "10px 0", borderBottom: i < 2 ? "1px solid " + C.border : "none", alignItems: "center" }}>
                        <span style={{ fontSize: 13, fontWeight: 600, color: escColors[i] }}>{f.escenario}</span>
                        {["q1", "q2", "q3", "q4"].map(function(q) {
                          return <EditableCell key={q} value={f[q]} onChange={function(v) { setForecastAnyo(i, q, v); }} style={{ fontSize: 12 }} />;
                        })}
                        <span style={{ textAlign: "right", fontFamily: mono, fontSize: 13, fontWeight: 700, color: escColors[i] }}>{t}</span>
                      </div>
                    );
                  })}
                </div>
              </div>
            </Card>
          </div>
        </Section>
      );
    }

    /* ═══════════ TAB: Clientes ═══════════ */
    function TabClientes({ selAnyo, selMes, selKey, navMes, selClientes, pylMensual, setPylMensual, clientes }) {
      var MESES_FULL = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
      var [cliVistaAnual, setCliVistaAnual] = useState(false);
      var [cliMes, setCliMes] = useState(selMes);
      var [cliAnyo, setCliAnyo] = useState(selAnyo);
      var cliKey = cliAnyo + "-" + cliMes;
      var navCliMes = function(dir) {
        var nm = cliMes + dir;
        if (nm < 0) { if (cliAnyo > 2026) { setCliAnyo(cliAnyo - 1); setCliMes(11); } }
        else if (nm > 11) { setCliAnyo(cliAnyo + 1); setCliMes(0); }
        else { setCliMes(nm); }
      };
      var navCliAnyo = function(dir) { var n = cliAnyo + dir; if (n >= 2026) setCliAnyo(n); };

      /* Resolve clients for selected month */
      var mesClientes = pylMensual.clientesPorMes && pylMensual.clientesPorMes[cliKey] ? pylMensual.clientesPorMes[cliKey] : clientes;

      /* Annual aggregation: sum fact across 12 months by client name */
      var anyoClientes = (function() {
        var totals = {};
        for (var mi = 0; mi < 12; mi++) {
          var k = cliAnyo + "-" + mi;
          var items = pylMensual.clientesPorMes && pylMensual.clientesPorMes[k] ? pylMensual.clientesPorMes[k] : clientes;
          items.forEach(function(c) {
            var name = c.nombre || "Sin nombre";
            if (!totals[name]) totals[name] = { nombre: name, fact: 0, margen: 0, count: 0, fechaAlta: c.fechaAlta || "", ultimoServicio: c.ultimoServicio || "", estado: c.estado || "activo" };
            totals[name].fact += Number(c.fact || 0);
            totals[name].margen += Number(c.margen || 0);
            totals[name].count++;
            if (c.ultimoServicio && c.ultimoServicio > totals[name].ultimoServicio) totals[name].ultimoServicio = c.ultimoServicio;
            if (c.fechaAlta && (!totals[name].fechaAlta || c.fechaAlta < totals[name].fechaAlta)) totals[name].fechaAlta = c.fechaAlta;
          });
        }
        return Object.keys(totals).map(function(name) { var t = totals[name]; t.margen = t.count > 0 ? Math.round(t.margen / t.count) : 0; return t; });
      })();

      var displayClientes = cliVistaAnual ? anyoClientes : mesClientes;

      /* Per-month setters */
      var setClienteField = function(origIdx, field, val) {
        setPylMensual(function(p) {
          var pm = Object.assign({}, p.clientesPorMes || {});
          var items = (pm[cliKey] || clientes.map(function(c) { return Object.assign({}, c); })).map(function(c, j) {
            return j === origIdx ? Object.assign({}, c, (function() { var o = {}; o[field] = val; return o; })()) : c;
          });
          pm[cliKey] = items;
          return Object.assign({}, p, { clientesPorMes: pm });
        });
      };
      var addClienteMes = function() {
        setPylMensual(function(p) {
          var pm = Object.assign({}, p.clientesPorMes || {});
          var items = (pm[cliKey] || clientes.map(function(c) { return Object.assign({}, c); })).concat([{ nombre: "Nuevo cliente", fact: 0, margen: 0, fechaAlta: cliAnyo + "-" + String(cliMes + 1).padStart(2, "0"), ultimoServicio: "", estado: "activo" }]);
          pm[cliKey] = items;
          return Object.assign({}, p, { clientesPorMes: pm });
        });
      };
      var removeClienteMes = function(idx) {
        setPylMensual(function(p) {
          var pm = Object.assign({}, p.clientesPorMes || {});
          var current = pm[cliKey] || clientes.map(function(c) { return Object.assign({}, c); });
          pm[cliKey] = current.filter(function(_, j) { return j !== idx; });
          return Object.assign({}, p, { clientesPorMes: pm });
        });
      };

      var sorted = displayClientes.map(function(c, i) { return Object.assign({ origIdx: i }, c); })
        .sort(function(a, b) { return Number(b.fact || 0) - Number(a.fact || 0); });
      var totalFact = displayClientes.reduce(function(s, c) { return s + Number(c.fact || 0); }, 0);
      var clientesActivos = displayClientes.filter(function(c) { return (c.estado || "activo") === "activo"; }).length;

      var concData = [
        { label: "Top 1", limit: 25, val: sorted.length > 0 ? ((Number(sorted[0].fact || 0) / (totalFact || 1)) * 100) : 0 },
        { label: "Top 3", limit: 50, val: (sorted.slice(0, 3).reduce(function(s, c) { return s + Number(c.fact || 0); }, 0) / (totalFact || 1)) * 100 },
        { label: "Top 5", limit: 70, val: (sorted.slice(0, 5).reduce(function(s, c) { return s + Number(c.fact || 0); }, 0) / (totalFact || 1)) * 100 },
      ];

      var periodLabel = cliVistaAnual ? "Anual " + cliAnyo : MESES_FULL[cliMes] + " " + cliAnyo;
      var estadoColor = function(e) { return e === "activo" ? C.green : e === "inactivo" ? C.textDim : C.amber; };
      var isAnual = cliVistaAnual;

      return (
        <Section title={"Cartera de Clientes — " + periodLabel} subtitle="Análisis de concentración y rentabilidad">
          {/* Period selector */}
          <div style={{ display: "flex", justifyContent: "center", alignItems: "center", gap: 12, marginBottom: 16, padding: "12px 0", background: C.surface, borderRadius: 10, border: "1px solid " + C.border }}>
            <div style={{ display: "flex", background: C.bg, borderRadius: 6, overflow: "hidden" }}>
              {["Mensual", "Anual"].map(function(t, ti) {
                var active = (ti === 0 && !cliVistaAnual) || (ti === 1 && cliVistaAnual);
                return <button key={t} onClick={function() { setCliVistaAnual(ti === 1); }}
                  style={{ background: active ? C.accent : "transparent", color: active ? C.white : C.textDim, border: "none", padding: "7px 14px", fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: font, transition: "all 0.15s" }}>{t}</button>;
              })}
            </div>
            <button onClick={function() { cliVistaAnual ? navCliAnyo(-1) : navCliMes(-1); }} disabled={cliAnyo <= 2026 && (cliVistaAnual || cliMes <= 0)}
              style={{ background: "transparent", border: "none", color: cliAnyo <= 2026 && (cliVistaAnual || cliMes <= 0) ? C.border : C.white, cursor: cliAnyo <= 2026 && (cliVistaAnual || cliMes <= 0) ? "default" : "pointer", fontSize: 16, padding: "0 8px", fontFamily: font, opacity: cliAnyo <= 2026 && (cliVistaAnual || cliMes <= 0) ? 0.3 : 1 }}>◂</button>
            <div style={{ textAlign: "center", minWidth: cliVistaAnual ? 60 : 160 }}>
              {!cliVistaAnual && <div style={{ fontSize: 16, fontWeight: 700, color: C.white }}>{MESES_FULL[cliMes]}</div>}
              <div style={{ fontSize: cliVistaAnual ? 18 : 12, fontWeight: 700, color: C.white, fontFamily: mono }}>{cliAnyo}</div>
            </div>
            <button onClick={function() { cliVistaAnual ? navCliAnyo(1) : navCliMes(1); }}
              style={{ background: "transparent", border: "none", color: C.white, cursor: "pointer", fontSize: 16, padding: "0 8px", fontFamily: font }}>▸</button>
          </div>

          {/* Hero metrics */}
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 16, marginBottom: 16 }} className="crux-grid-4">
            <Card style={{ textAlign: "center", padding: "20px 16px" }}>
              <div style={{ fontSize: 10, color: C.textDim, textTransform: "uppercase", letterSpacing: 0.5 }}>{isAnual ? "Facturación anual" : "Facturación mes"}</div>
              <div style={{ fontSize: 28, fontWeight: 700, fontFamily: mono, color: C.white, marginTop: 6 }}>{fmt(totalFact)} €</div>
              <div style={{ fontSize: 10, color: C.textDim, marginTop: 4 }}>{clientesActivos} clientes activos</div>
            </Card>
            {concData.map(function(cd, i) {
              var ok = Number(cd.val) < cd.limit;
              return (
                <Card key={i} style={{ textAlign: "center", padding: "20px 16px" }}>
                  <div style={{ fontSize: 10, color: C.textDim, textTransform: "uppercase", letterSpacing: 0.5 }}>{"Concentración " + cd.label}</div>
                  <div style={{ fontSize: 28, fontWeight: 700, fontFamily: mono, color: ok ? C.green : C.red, marginTop: 6 }}>{Number(cd.val).toFixed(0)}%</div>
                  <div style={{ fontSize: 10, color: ok ? C.green : C.red, marginTop: 4 }}>{"Ref: <" + cd.limit + "%"}</div>
                </Card>
              );
            })}
          </div>

          <div className="crux-grid-2" style={{ display: "grid", gridTemplateColumns: "1fr 1.8fr", gap: 16 }}>
            {/* Donut */}
            <Card>
              <CardLabel>{isAnual ? "Ranking Anual" : "Distribución Mes"}</CardLabel>
              {(function() {
                var activos = sorted.filter(function(c) { return Number(c.fact || 0) > 0; });
                return activos.length > 0 ? (
                  <ApexChart type="donut" height={240} options={{
                    series: activos.map(function(c) { return Number(c.fact); }),
                    labels: activos.map(function(c) { return c.nombre; }),
                    colors: ["#AB8338", "#3869AB", "#3E526B", "#564C39", "#2A2E33", "#C49A4A", "#5A7FA8", "#6B7E94"],
                    stroke: { show: false, width: 0 },
                    legend: { position: "bottom", labels: { colors: C.textSec }, fontSize: "10px" },
                    plotOptions: { pie: { donut: { size: "60%", labels: { show: true, total: { show: true, label: isAnual ? "Total anual" : "Total", color: C.textDim, fontSize: "10px", formatter: function() { return fmt(totalFact) + " €"; } }, value: { fontSize: "14px", fontFamily: mono, color: C.white, offsetY: 2 } } } } },
                  }} />
                ) : <div style={{ padding: 40, textAlign: "center", color: C.textDim, fontSize: 12 }}>Sin datos de facturación</div>;
              })()}
            </Card>

            {/* Ranking table */}
            <Card style={{ overflowX: "auto" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
                <CardLabel>{isAnual ? "Ranking Global " + cliAnyo : "Clientes del Mes"}</CardLabel>
                {!isAnual && <button className="crux-btn-add" onClick={addClienteMes} style={{ background: C.accentGlow, color: C.accent, border: "1px solid " + C.accentMuted, borderRadius: 6, padding: "5px 12px", fontSize: 10, fontWeight: 600, cursor: "pointer", fontFamily: font }}>+ Añadir</button>}
              </div>
              <div style={{ overflowX: "auto", WebkitOverflowScrolling: "touch" }}><div style={{ minWidth: 600 }}>
              <div style={{ display: "grid", gridTemplateColumns: isAnual ? "28px 2fr 1fr 0.6fr 0.6fr 0.8fr 0.8fr" : "28px 2fr 1fr 0.6fr 0.6fr 0.8fr 0.6fr 28px", fontSize: 10, color: C.textDim, paddingBottom: 8, borderBottom: "1px solid " + C.border }}>
                <span>#</span><span>Cliente</span><span style={{ textAlign: "right" }}>{isAnual ? "Fact. anual" : "Facturación"}</span><span style={{ textAlign: "center" }}>Margen</span><span style={{ textAlign: "center" }}>Share</span><span style={{ textAlign: "center" }}>Alta</span>{isAnual ? <span style={{ textAlign: "center" }}>Estado</span> : React.createElement(React.Fragment, null, <span style={{ textAlign: "center" }}>Últ. serv.</span>, <span></span>)}
              </div>
              {sorted.map(function(c, rank) {
                var i = c.origIdx;
                var pct = totalFact > 0 ? ((Number(c.fact) / totalFact) * 100).toFixed(0) : 0;
                var mc = Number(c.margen) >= 50 ? C.green : Number(c.margen) >= 35 ? C.amber : C.red;
                var ec = estadoColor(c.estado || "activo");
                return (
                  <div key={i} style={{ display: "grid", gridTemplateColumns: isAnual ? "28px 2fr 1fr 0.6fr 0.6fr 0.8fr 0.8fr" : "28px 2fr 1fr 0.6fr 0.6fr 0.8fr 0.6fr 28px", padding: "10px 0", borderBottom: "1px solid " + C.border, alignItems: "center" }}>
                    <span style={{ fontSize: 12, fontWeight: 700, color: rank < 3 ? C.accent : C.textDim }}>{rank + 1}</span>
                    {isAnual ? (
                      <span style={{ fontSize: 13, color: C.textSec }}>{c.nombre}</span>
                    ) : (
                      <EditableText value={c.nombre} onChange={function(v) { setClienteField(i, "nombre", v); }} />
                    )}
                    {isAnual ? (
                      <span style={{ textAlign: "right", fontFamily: mono, fontSize: 13, color: C.white }}>{fmt(Number(c.fact))}</span>
                    ) : (
                      <EditableCell value={c.fact} onChange={function(v) { setClienteField(i, "fact", Number(v)); }} style={{ textAlign: "right" }} />
                    )}
                    {isAnual ? (

                      ) : <span></span>
                    )}
                  </div>
                );
              })}
              </div></div>
            </Card>
          </div>
        </Section>
      );
    }

    /* ═══════════ TAB: Escenarios ═══════════ */
    function TabEscenarios({ escenarios, updateEscenarios, pyl, cash, burnRate }) {
      var MESES = ["Ene", "Feb", "Mar", "Abr", "May", "Jun", "Jul", "Ago", "Sep", "Oct", "Nov", "Dic"];
      var escColors = ["#564C39", "#3869AB", "#AB8338"];

      /* — Proyecciones — */
      var proyecciones = escenarios.map(function(esc) {
        var rev = [], cos = [], opx = [], neto = [], cashProy = [], margenPct = [];
        var cashAcum = cash.caja;
        for (var m = 0; m < 12; m++) {
          var r = pyl.ingresos * Math.pow(1 + esc.crecRevenue / 100 / 12, m + 1);
          var c = pyl.costesDirectos * Math.pow(1 + esc.crecCostes / 100 / 12, m + 1);
          var o = pyl.opex * Math.pow(1 + esc.crecOpex / 100 / 12, m + 1);
          var n = r - c - o;
          cashAcum += n;
          rev.push(Math.round(r));
          cos.push(Math.round(c));
          opx.push(Math.round(o));
          neto.push(Math.round(n));
          cashProy.push(Math.round(cashAcum));
          margenPct.push(r > 0 ? Number(((r - c) / r * 100).toFixed(1)) : 0);
        }
        var totalRev12 = rev.reduce(function(s, v) { return s + v; }, 0);
        var totalNeto12 = neto.reduce(function(s, v) { return s + v; }, 0);
        var runwayFinal = neto[11] < 0 ? (cashProy[11] / Math.abs(neto[11])).toFixed(1) : "∞";
        return { nombre: esc.nombre, rev: rev, cos: cos, opx: opx, neto: neto, cash: cashProy, margen: margenPct, totalRev12: totalRev12, totalNeto12: totalNeto12, cashFinal: cashProy[11], runwayFinal: runwayFinal };
      });

      return (
        <Section title="Simulador de Escenarios" subtitle="Proyección a 12 meses basada en P&L actual y tasas de crecimiento">
          {/* Parámetros */}
          <div className="crux-grid-3" style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 16, marginBottom: 16 }}>
            {escenarios.map(function(esc, ei) {
              return (
                <Card key={ei}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 14 }}>
                    <div style={{ width: 10, height: 10, borderRadius: "50%", background: escColors[ei] }}></div>
                    <span style={{ fontSize: 14, fontWeight: 700, color: C.white }}>{esc.nombre}</span>
                  </div>
                  {[
                    { label: "Crec. ingresos", field: "crecRevenue", unit: "% anual", ref: "SaaS >20% · Servicios >10%" },
                    { label: "Crec. costes dir.", field: "crecCostes", unit: "% anual", ref: "Escalar < revenue growth" },
                    { label: "Crec. OPEX", field: "crecOpex", unit: "% anual", ref: "Objetivo: <50% de ingresos" },
                  ].map(function(p) {
                    return (
                      <div key={p.field} style={{ marginBottom: 10 }}>
                        <div style={{ fontSize: 10, color: C.textDim, marginBottom: 4 }}>{p.label}</div>
                        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                          <EditableCell value={esc[p.field]} onChange={function(v) { updateEscenarios(ei, p.field, Number(v)); }} style={{ width: 70, textAlign: "center", fontSize: 16, fontWeight: 700 }} />
                          <span style={{ fontSize: 11, color: C.textDim }}>{p.unit}</span>
                        </div>
                        <div style={{ fontSize: 9, color: C.accent, marginTop: 2 }}>{p.ref}</div>
                      </div>
                    );
                  })}
                  {/* KPIs resumen */}
                  <div style={{ borderTop: "1px solid " + C.border, paddingTop: 10, marginTop: 6 }}>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, fontSize: 10 }}>
                      <div><span style={{ color: C.textDim }}>Rev. 12m: </span><span style={{ fontFamily: mono, fontWeight: 700, color: C.white }}>{fmt(proyecciones[ei].totalRev12)} €</span></div>
                      <div><span style={{ color: C.textDim }}>Neto 12m: </span><span style={{ fontFamily: mono, fontWeight: 700, color: proyecciones[ei].totalNeto12 >= 0 ? C.green : C.red }}>{fmt(proyecciones[ei].totalNeto12)} €</span></div>
                      <div><span style={{ color: C.textDim }}>Caja mes 12: </span><span style={{ fontFamily: mono, fontWeight: 700, color: proyecciones[ei].cashFinal >= 0 ? C.green : C.red }}>{fmt(proyecciones[ei].cashFinal)} €</span></div>
                      <div><span style={{ color: C.textDim }}>Runway: </span><span style={{ fontFamily: mono, fontWeight: 700, color: Number(proyecciones[ei].runwayFinal) >= 6 || proyecciones[ei].runwayFinal === "∞" ? C.green : C.amber }}>{proyecciones[ei].runwayFinal} meses</span></div>
                    </div>
                  </div>
                </Card>
              );
            })}
          </div>

          {/* Gráficas */}
          <div className="crux-grid-2" style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginBottom: 16 }}>
            <Card>
              <CardLabel>Proyección de Ingresos — 12 meses</CardLabel>
              <ApexChart type="line" height={260} options={{
                series: proyecciones.map(function(p, i) { return { name: p.nombre, data: p.rev }; }),
                colors: escColors,
                stroke: { width: 2.5, curve: "smooth" },
                xaxis: { categories: MESES, labels: { style: { colors: C.textDim, fontSize: "11px" } } },
                yaxis: { labels: { style: { colors: C.textDim, fontSize: "11px" }, formatter: function(v) { return fmt(Math.round(v)); } } },
                legend: { position: "top", horizontalAlign: "right", labels: { colors: C.textSec }, fontSize: "11px", markers: { radius: 2 } },
                grid: { borderColor: C.border, strokeDashArray: 3 },
                annotations: { yaxis: [{ y: pyl.ingresos, borderColor: C.textDim, strokeDashArray: 4, label: { text: "Actual: " + fmt(pyl.ingresos), style: { color: C.textDim, fontSize: "9px", background: C.surface } } }] },
              }} />
            </Card>
            <Card>
              <CardLabel>Proyección de Tesorería — 12 meses</CardLabel>
              <ApexChart type="area" height={260} options={{
                series: proyecciones.map(function(p, i) { return { name: p.nombre, data: p.cash }; }),
                colors: escColors,
                stroke: { width: 2, curve: "smooth" },
                fill: { type: "gradient", gradient: { opacityFrom: 0.15, opacityTo: 0.02 } },
                xaxis: { categories: MESES, labels: { style: { colors: C.textDim, fontSize: "11px" } } },
                yaxis: { labels: { style: { colors: C.textDim, fontSize: "11px" }, formatter: function(v) { return fmt(Math.round(v)); } } },
                legend: { position: "top", horizontalAlign: "right", labels: { colors: C.textSec }, fontSize: "11px", markers: { radius: 2 } },
                grid: { borderColor: C.border, strokeDashArray: 3 },
                annotations: { yaxis: [{ y: 0, borderColor: C.red, strokeDashArray: 0, label: { text: "Punto crítico", style: { color: C.red, fontSize: "9px", background: C.surface } } }] },
              }} />
            </Card>
          </div>
          <div className="crux-grid-2" style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
            <Card>
              <CardLabel>Resultado Neto Mensual</CardLabel>
              <ApexChart type="bar" height={240} options={{
                series: proyecciones.map(function(p) { return { name: p.nombre, data: p.neto }; }),
                colors: escColors,
                plotOptions: { bar: { borderRadius: 2, columnWidth: "60%" } },
                dataLabels: { enabled: false },
                xaxis: { categories: MESES, labels: { style: { colors: C.textDim, fontSize: "11px" } } },
                yaxis: { labels: { style: { colors: C.textDim, fontSize: "11px" }, formatter: function(v) { return fmt(Math.round(v)); } } },
                legend: { position: "top", horizontalAlign: "right", labels: { colors: C.textSec }, fontSize: "11px", markers: { radius: 2 } },
                grid: { borderColor: C.border, strokeDashArray: 3 },
                annotations: { yaxis: [{ y: 0, borderColor: C.textDim, strokeDashArray: 2 }] },
              }} />
            </Card>
            <Card>
              <CardLabel>Margen Bruto % — Evolución</CardLabel>
              <ApexChart type="line" height={240} options={{
                series: proyecciones.map(function(p) { return { name: p.nombre, data: p.margen }; }),
                colors: escColors,
                stroke: { width: 2.5, curve: "smooth" },
                xaxis: { categories: MESES, labels: { style: { colors: C.textDim, fontSize: "11px" } } },
                yaxis: { min: 0, max: 100, labels: { style: { colors: C.textDim, fontSize: "11px" }, formatter: function(v) { return v.toFixed(0) + "%"; } } },
                legend: { position: "top", horizontalAlign: "right", labels: { colors: C.textSec }, fontSize: "11px", markers: { radius: 2 } },
                grid: { borderColor: C.border, strokeDashArray: 3 },
                annotations: { yaxis: [
                  { y: 50, y2: 65, fillColor: C.green, opacity: 0.06, label: { text: "Rango saludable 50-65%", style: { color: C.green, fontSize: "9px", background: "transparent" } } },
                  { y: 15, borderColor: C.red, strokeDashArray: 4, label: { text: "Mínimo rentable 15%", style: { color: C.red, fontSize: "9px", background: C.surface } } },
                ] },
              }} />
            </Card>
          </div>

          {/* Referencias financieras */}
          <Card style={{ marginTop: 16 }}>
            <CardLabel>Referencias Financieras — Benchmarks</CardLabel>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 16, padding: "8px 0" }} className="crux-grid-4">
              {[
                { label: "Crecimiento YoY", ref: ">20% SaaS · >10% servicios", desc: "Ritmo sostenible de crecimiento" },
                { label: "Margen bruto", ref: "50–65%", desc: "Servicios profesionales B2B" },
                { label: "Margen operativo", ref: ">15%", desc: "Rentabilidad post-OPEX" },
                { label: "Runway mínimo", ref: ">6 meses", desc: "Colchón de seguridad" },

                return (
