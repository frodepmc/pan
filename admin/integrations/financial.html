    /* ═══════════ TAB: Estratégico ═══════════ */
    function TabEstrategico({ data, setData, pyl, clientes, pylMensual, servicios }) {
      const set = function(f, v) { setData(function(p) { return Object.assign({}, p, { [f]: Number(v) }); }); };

      /* Auto-computed values */
      var computedMargenOp = pyl.ingresos > 0 ? Number(((pyl.ingresos - pyl.costesDirectos - pyl.opex) / pyl.ingresos * 100).toFixed(1)) : 0;

      var totalClientesFact = clientes.reduce(function(s, c) { return s + Number(c.fact || 0); }, 0);
      var sorted = clientes.slice().sort(function(a, b) { return Number(b.fact || 0) - Number(a.fact || 0); });
      var top3Fact = sorted.slice(0, 3).reduce(function(s, c) { return s + Number(c.fact || 0); }, 0);
      var computedConcentracion = totalClientesFact > 0 ? Number(((top3Fact / totalClientesFact) * 100).toFixed(0)) : 0;

      var currentYearData = pylMensual.datos[pylMensual.anyo] || EMPTY_YEAR();
      var totalMensualIng = currentYearData.reduce(function(s, m) { return s + Number(m.ingresos || 0); }, 0);
      var prevYearIng = Number(pylMensual.prevYear.ingresos || 0);
      var computedCrecYoY = prevYearIng > 0 ? Number(((totalMensualIng - prevYearIng) / prevYearIng * 100).toFixed(1)) : 0;

      /* LTV:CAC global = weighted average by revenue */
      var totalServIng = servicios.reduce(function(s, sv) { return s + Number(sv.ingresos || 0); }, 0);
      var computedLtvCac = totalServIng > 0 ? Number((servicios.reduce(function(s, sv) { return s + Number(sv.ltv_cac || 0) * Number(sv.ingresos || 0); }, 0) / totalServIng).toFixed(1)) : 0;



      const inds = [
        { label: "Crecimiento YoY", field: "crecimientoYoY", unit: "%", ref: "Ritmo crecimiento real", freq: "Trimestral", computed: true, value: computedCrecYoY, status: computedCrecYoY >= 10 ? "sano" : computedCrecYoY >= 0 ? "alerta" : "riesgo" },
        { label: "Margen operativo", field: "margenOperativo", unit: "%", ref: "Rentabilidad post-OPEX", freq: "Mensual", computed: true, value: computedMargenOp, status: computedMargenOp >= 15 ? "sano" : computedMargenOp >= 8 ? "alerta" : "riesgo" },
        { label: "LTV:CAC global", field: "ltvCacGlobal", unit: ":1", ref: "Sostenibilidad", freq: "Trimestral", computed: true, value: computedLtvCac, status: computedLtvCac >= 3 ? "sano" : computedLtvCac >= 2 ? "alerta" : "riesgo" },
        { label: "Concentración top 3", field: "concentracionTop3", unit: "%", ref: "Objetivo: <40%", freq: "Trimestral", computed: true, value: computedConcentracion, status: computedConcentracion < 40 ? "sano" : computedConcentracion < 50 ? "alerta" : "riesgo" },
        { label: "Cash Conversion Cycle", field: "cashConversion", unit: "días", ref: "Eficiencia trabajo→caja", freq: "Mensual", value: data.cashConversion, status: data.cashConversion <= 45 ? "sano" : data.cashConversion <= 60 ? "alerta" : "riesgo" },
      ];
      return (
        <Section title="Indicadores Estratégicos" subtitle="Los números que hablan con la dirección — Módulo 2.3, sección 5">
          <div className="crux-grid-2" style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginBottom: 16 }}>
            {inds.map(function(ind) {
              return (
                <Card key={ind.field} style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <div>
                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                      <span style={{ fontSize: 13, fontWeight: 700, color: C.white }}>{ind.label}</span>

      // Headers builder
      const authHeaders = function() {
        const h = { "Content-Type": "application/json" };
        if (API_TOKEN) h["x-api-token"] = API_TOKEN;
        return h;
      };

      // LOAD from backend
      const loadFromBackend = useCallback(async function() {
        setSyncStatus("loading");
        try {
          const res = await fetch(API_URL, { headers: authHeaders(), cache: "no-store", credentials: "same-origin" });
          if (res.status === 401) {
            // Sesión caducada durante el uso → volver al login
            window.location.replace('/admin');
            return;
          }
          if (res.status === 404) {
            // No state yet — first boot, use defaults
            setSyncStatus("saved"); setLastSync(new Date()); setHydrated(true);
            return;
          }
          if (!res.ok) throw new Error("HTTP " + res.status);
          const body = await res.json();
          if (body && body.data) applySnapshot(body.data);
          setSyncStatus("saved"); setLastSync(new Date()); setHydrated(true);
        } catch (err) {
          console.warn("[CRUX] Backend no disponible, modo local:", err.message);
          setSyncStatus("offline"); setHydrated(true);
        }
      }, [applySnapshot]);

      // SAVE to backend
      const saveToBackend = useCallback(async function() {
        if (!hydrated) return;
        if (syncStatus === "offline") return; // no point retrying without backend
        setSyncStatus("saving");
        try {
          const snap = buildSnapshot();
          const res = await fetch(API_URL, {
            method: "POST",
            headers: authHeaders(),
            credentials: "same-origin",
            body: JSON.stringify({ data: snap })
          });
          if (res.status === 401) {
            window.location.replace('/admin');
            return;
          }
          if (!res.ok) throw new Error("HTTP " + res.status);
          const body = await res.json();
          if (body.error) throw new Error(body.error);
          setSyncStatus("saved"); setLastSync(new Date());
        } catch (err) {
          console.error("[CRUX] Save error", err);
          setSyncStatus("error");
        }
      }, [buildSnapshot, hydrated, syncStatus]);

      // Load on mount
      useEffect(function() { loadFromBackend(); }, []);

      // Debounced autosave on any state change after hydration
      useEffect(function() {
        if (!hydrated || syncStatus === "offline") return;
        if (saveTimerRef.current) clearTimeout(saveTimerRef.current);
        saveTimerRef.current = setTimeout(function() { saveToBackend(); }, 1500);
        return function() { if (saveTimerRef.current) clearTimeout(saveTimerRef.current); };
      }, [pyl, aging, cash, forecast, clientes, servicios, escenarios, pylMensual, estrategico, checklist, hydrated]);

      /* ── Global month/year selector ── */
      const [selAnyo, setSelAnyo] = useState(pylMensual.anyo);
      const [selMes, setSelMes] = useState(function() {
        var d = pylMensual.datos[pylMensual.anyo] || EMPTY_YEAR();
        var last = 0; d.forEach(function(m, i) { if (Number(m.ingresos || 0) > 0) last = i; }); return last;
      });
      var selKey = selAnyo + "-" + selMes;
      var navMesGlobal = function(dir) {
        var nm = selMes + dir;
        if (nm < 0) { if (selAnyo > 2026) { setSelAnyo(selAnyo - 1); setSelMes(11); } }
        else if (nm > 11) { setSelAnyo(selAnyo + 1); setSelMes(0); }
        else { setSelMes(nm); }
      };

      const updateArr = useCallback(function(setter) {
        return function(index, field, value) {
          setter(function(prev) {
            return prev.map(function(item, i) {
              return i === index ? Object.assign({}, item, { [field]: value }) : item;
            });
          });
        };
      }, []);

      /* ── Print View export effect ── */
      useEffect(function() {
        if (!printTabId) return;
        window.scrollTo(0, 0);
        var el = document.querySelector("main");
        if (!el) { setPrintTabId(null); return; }
        /* Save originals */
        var origBodyOvf = document.body.style.overflow;
        var origHtmlOvf = document.documentElement.style.overflow;
        var origMargin = el.style.margin;
        var origMaxW = el.style.maxWidth;
        var origPad = el.style.padding;
        /* Kill scrollbar + remove centering (margin:auto causes offset in real Chrome) */
        document.body.style.overflow = "hidden";
        document.documentElement.style.overflow = "hidden";
        el.style.margin = "0";
        el.style.maxWidth = "none";
        el.style.padding = "12px 20px";
        var timer = setTimeout(function() {
          var slug = TAB_SLUGS[printTabId] || "tab";
          var rect = el.getBoundingClientRect();
          var captureW = Math.ceil(rect.width);
          var pdfW = 420;
          var pdfH = Math.max(297, Math.ceil(pdfW * (rect.height / captureW)) + 10);
          html2pdf().set({
            margin: [6, 8, 6, 8],
            filename: "crux-" + slug + "-" + new Date().toISOString().slice(0, 10) + ".pdf",
            image: { type: "jpeg", quality: 0.95 },
            html2canvas: { scale: 2, backgroundColor: "#0E1A2B", useCORS: true, scrollX: 0, scrollY: 0, windowWidth: captureW, logging: false },
            jsPDF: { unit: "mm", format: [pdfW, pdfH], orientation: "landscape" },
            pagebreak: { mode: ["avoid-all", "css"] },
          }).from(el).save().then(function() {
            document.body.style.overflow = origBodyOvf;
            document.documentElement.style.overflow = origHtmlOvf;
            el.style.margin = origMargin; el.style.maxWidth = origMaxW; el.style.padding = origPad;
            setPrintTabId(null);
          }).catch(function() {
            document.body.style.overflow = origBodyOvf;
            document.documentElement.style.overflow = origHtmlOvf;
            el.style.margin = origMargin; el.style.maxWidth = origMaxW; el.style.padding = origPad;
            setPrintTabId(null);
          });
        }, 1200);
        return function() { clearTimeout(timer); };
      }, [printTabId]);

      /* Expose print trigger for exportCurrentTab */
      window.__cruxExportPrint = function(tabId) { setPrintTabId(tabId); };

      /* ── Per-month resolved data ── */
      var MESES_FULL_G = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
      var selPylMes = (pylMensual.datos[selAnyo] || EMPTY_YEAR())[selMes] || { ingresos: 0, costes: 0, opex: 0 };
      var selIng = Number(selPylMes.ingresos || 0);
      var selCos = Number(selPylMes.costes || 0);
      var selOpex = Number(selPylMes.opex || 0);
      var selClientes = pylMensual.clientesPorMes && pylMensual.clientesPorMes[selKey] ? pylMensual.clientesPorMes[selKey] : clientes;
      var selAging = pylMensual.agingPorMes && pylMensual.agingPorMes[selKey] ? pylMensual.agingPorMes[selKey] : aging;
      var selCaja = pylMensual.cajaPorMes && pylMensual.cajaPorMes[selKey] != null ? pylMensual.cajaPorMes[selKey] : cash.caja;
      var selForecast = pylMensual.forecastPorAnyo && pylMensual.forecastPorAnyo[selAnyo] ? pylMensual.forecastPorAnyo[selAnyo] : forecast;

      /* ── Auto-computed values (from selected month) ── */
      var burnRate = selCos + selOpex;
      var netBurn = Math.max(0, burnRate - selIng);
      var agingTotal = selAging.reduce(function(s, a) { return s + Number(a.importe || 0); }, 0);
      var computedDSO = selIng > 0 ? Math.round((agingTotal / selIng) * 30) : 0;

      return (
        <div style={{ background: C.bg, minHeight: "100vh", fontFamily: font, color: C.text }}>
          <header className="crux-header" style={{ padding: "28px 36px 0", borderBottom: "1px solid " + C.border }}>
            <div className="crux-header-inner" style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 24 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
                <img src={CRUX_LOGO} alt="CRUX" style={{ width: 44, height: 44, objectFit: "contain", filter: "brightness(0) invert(1) drop-shadow(0 2px 8px rgba(255,255,255,0.15))" }} />
              </div>
              <div className="crux-header-right" style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 8 }}>
                {/* Sync status */}
                <div style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 11, fontFamily: font, color: syncStatus === "error" ? C.red : syncStatus === "saving" || syncStatus === "loading" ? C.amber : syncStatus === "offline" ? C.textDim : C.green, letterSpacing: 0.3 }}>
                  <span style={{ width: 8, height: 8, borderRadius: "50%", background: "currentColor", boxShadow: "0 0 8px currentColor", display: "inline-block" }}></span>
                  <span style={{ fontWeight: 600 }}>
                    {syncStatus === "loading" ? "Cargando…" : syncStatus === "saving" ? "Guardando…" : syncStatus === "error" ? "Error de sincronización" : syncStatus === "offline" ? "Modo local" : syncStatus === "saved" ? ("Guardado" + (lastSync ? " · " + lastSync.toLocaleTimeString("es-ES", { hour: "2-digit", minute: "2-digit" }) : "")) : "En espera"}
                  </span>
                  <button onClick={loadFromBackend} title="Recargar desde servidor" style={{ background: "transparent", border: "1px solid " + C.border, color: C.textDim, padding: "2px 8px", borderRadius: 4, fontSize: 10, cursor: "pointer", fontFamily: font }}>↻</button>
                </div>
                <div style={{ display: "flex", gap: 6 }}>
                  <button className="crux-btn-add" onClick={function() { exportCurrentTab(); }} style={{ background: C.accentGlow, color: C.accent, border: "1px solid " + C.accentMuted, borderRadius: 6, padding: "5px 12px", fontSize: 11, fontWeight: 600, cursor: "pointer", fontFamily: font, display: "flex", alignItems: "center", gap: 4 }}>
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    PDF tab
                  </button>
                  <button className="crux-btn-add" onClick={function() { exportFullPage(); }} style={{ background: C.accentGlow, color: C.accent, border: "1px solid " + C.accentMuted, borderRadius: 6, padding: "5px 12px", fontSize: 11, fontWeight: 600, cursor: "pointer", fontFamily: font, display: "flex", alignItems: "center", gap: 4 }}>
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    PDF completo
                  </button>
                </div>
              </div>
            </div>
            <nav className="crux-tabs" style={{ display: "flex", gap: 1 }}>
              {tabs.map(function(t) {
                return (
                  <button key={t.id} className="crux-tab-btn" onClick={function() { setTab(t.id); window.__cruxActiveTab = t.id; }} style={{
                    padding: "11px 18px", fontSize: 12, fontWeight: tab === t.id ? 700 : 500, fontFamily: font,
                    color: tab === t.id ? C.accent : C.textDim, background: tab === t.id ? C.accentGlow : "transparent",
                    border: "none", borderBottom: tab === t.id ? "2px solid " + C.accent : "2px solid transparent",
                    borderRadius: "6px 6px 0 0", cursor: "pointer", whiteSpace: "nowrap", transition: "all 0.15s", letterSpacing: 0.2,
                  }}>{t.label}</button>
                );
              })}
            </nav>
          </header>

          <main className="crux-main" style={{ padding: printTabId ? "12px 24px" : "28px 36px", maxWidth: printTabId ? 1220 : 1280, margin: "0 auto", overflow: printTabId ? "hidden" : "visible" }}>
            {printTabId ? (
              React.createElement(React.Fragment, null,
                <PrintViewHeader tabName={TAB_NAMES[printTabId] || "Dashboard"} />,
                printTabId === "kpi" ? <PrintViewKPI selAnyo={selAnyo} selMes={selMes} pylMensual={pylMensual} selClientes={selClientes} selAging={selAging} selCaja={selCaja} servicios={servicios} estrategico={estrategico} burnRate={burnRate} netBurn={netBurn} selIng={selIng} selCos={selCos} selOpex={selOpex} pyl={pyl} /> : null,
                printTabId === "pyl" ? <PrintViewPYL pyl={pyl} pylMensual={pylMensual} selAnyo={selAnyo} /> : null,
                printTabId === "costes" ? <PrintViewCostes pyl={pyl} pylMensual={pylMensual} selAnyo={selAnyo} selIng={selIng} selCos={selCos} selOpex={selOpex} /> : null,
                printTabId === "cash" ? <PrintViewCash selAging={selAging} selCaja={selCaja} forecast={forecast} burnRate={burnRate} netBurn={netBurn} /> : null,
                printTabId === "clientes" ? <PrintViewClientes selClientes={selClientes} /> : null,
                printTabId === "unit" ? <PrintViewUnit servicios={servicios} /> : null,
                printTabId === "escenarios" ? <PrintViewEscenarios escenarios={escenarios} pyl={pyl} cash={cash} burnRate={burnRate} /> : null,
                printTabId === "estrategico" ? <PrintViewEstrategico data={estrategico} pyl={pyl} clientes={selClientes} pylMensual={pylMensual} servicios={servicios} /> : null,
                printTabId === "checklist" ? <PrintViewChecklist items={checklist} /> : null,
                <PrintViewFooter />
              )
            ) : (
              React.createElement(React.Fragment, null,
                tab === "kpi" ? <TabKPI selAnyo={selAnyo} setSelAnyo={setSelAnyo} selMes={selMes} navMes={navMesGlobal} selKey={selKey} pylMensual={pylMensual} selClientes={selClientes} selAging={selAging} selCaja={selCaja} servicios={servicios} estrategico={estrategico} burnRate={burnRate} netBurn={netBurn} computedDSO={computedDSO} selIng={selIng} selCos={selCos} selOpex={selOpex} /> : null,
                tab === "pyl" ? <TabPYL pyl={pyl} setPyl={setPyl} pylMensual={pylMensual} setPylMensual={setPylMensual} selAnyo={selAnyo} /> : null,
                tab === "costes" ? <TabCostes pyl={pyl} setPyl={setPyl} pylMensual={pylMensual} setPylMensual={setPylMensual} selAnyo={selAnyo} selIng={selIng} selCos={selCos} selOpex={selOpex} /> : null,
                tab === "cash" ? <TabCash selAnyo={selAnyo} selMes={selMes} selKey={selKey} navMes={navMesGlobal} selAging={selAging} selCaja={selCaja} selForecast={selForecast} pylMensual={pylMensual} setPylMensual={setPylMensual} aging={aging} cash={cash} forecast={forecast} burnRate={burnRate} netBurn={netBurn} /> : null,
                tab === "clientes" ? <TabClientes selAnyo={selAnyo} selMes={selMes} selKey={selKey} navMes={navMesGlobal} selClientes={selClientes} pylMensual={pylMensual} setPylMensual={setPylMensual} clientes={clientes} /> : null,
                tab === "unit" ? <TabUnit servicios={servicios} updateServicios={updateArr(setServicios)} setServicios={setServicios} /> : null,
                tab === "escenarios" ? <TabEscenarios escenarios={escenarios} updateEscenarios={updateArr(setEscenarios)} pyl={pyl} cash={cash} burnRate={burnRate} /> : null,
                tab === "estrategico" ? <TabEstrategico data={estrategico} setData={setEstrategico} pyl={pyl} clientes={selClientes} pylMensual={pylMensual} servicios={servicios} /> : null,
                tab === "checklist" ? <TabChecklist items={checklist} setItems={setChecklist} /> : null
              )
            )}
          </main>

          <footer className="crux-footer" style={{ padding: "20px 36px 28px", borderTop: "1px solid " + C.border }}>
            <p style={{ fontSize: 11, color: C.textDim, margin: 0, textAlign: "center", fontStyle: "italic", maxWidth: 640, marginInline: "auto", lineHeight: 1.7 }}>
              {"«La función financiera no es para contables: es para directivos. Necesitas dominar cinco números, tres rutinas y una convicción.»"}
              <span style={{ fontStyle: "normal", display: "block", marginTop: 4 }}> — CRUX Consulting, Módulo 2.3</span>
            </p>
          </footer>

          {/* Print view renders inside <main> above */}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<CRUXDashboard />);
  </script>
</body>
</html>
